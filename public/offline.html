<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#071014" />
    <title>Collective Dream Observatory Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #030407;
        color: #e2e8f0;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(34, 211, 238, .18), transparent 28rem),
          #030407;
      }
      main {
        max-width: 34rem;
        border: 1px solid rgba(34, 211, 238, .24);
        border-radius: 28px;
        background: rgba(9, 13, 20, .86);
        padding: 32px;
        box-shadow: 0 0 48px rgba(34, 211, 238, .12);
      }
      p {
        line-height: 1.7;
        color: #cbd5e1;
      }
      a {
        color: #67e8f9;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Collective Dream Observatory</h1>
      <p>You are offline. If the app shell is already installed, return to the recorder and save the dream draft on this device until your connection returns.</p>
      <p><a href="/">Open the observatory</a></p>
    </main>
  </body>
</html>
